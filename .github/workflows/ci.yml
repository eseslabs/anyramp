name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace
        run: bun install

      - name: Typecheck backend
        run: cd apps/backend && bun run typecheck

      - name: Typecheck frontend
        run: cd apps/frontend && bun run typecheck

      - name: Build frontend
        run: cd apps/frontend && bun run build
        env:
          VITE_STELLAR_NETWORK: testnet

  # Build the backend image; on push to main, publish it to GHCR (GitHub Packages).
  docker:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          # PRs only build (validate); pushes to main publish to GHCR.
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/anyramp-backend:latest
            ghcr.io/${{ github.repository_owner }}/anyramp-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
